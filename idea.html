<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arrow Jab Animation</title>
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .arrow {
      display: inline-block;
      animation: arrow-jab 1.5s ease-out forwards;
    }

    @keyframes arrow-jab {
      0% {
        transform: scale(0) rotate(45deg) translate(0, 0);
      }
      15% {
        transform: scale(1) rotate(45deg) translate(0, 0);          /* fast grow */
      }
      40% {
        transform: scale(1) rotate(45deg) translate(0, 0);          /* pause */
      }
      50% {
        transform: scale(1) rotate(45deg) translate(-40px, 40px);   /* quick jab 1 */
      }
      60% {
        transform: scale(1) rotate(45deg) translate(0, 0);          /* back */
      }
      70% {
        transform: scale(1) rotate(45deg) translate(-40px, 40px);   /* quick jab 2 */
      }
      80% {
        transform: scale(1) rotate(45deg) translate(0, 0);          /* back */
      }
      100% {
        transform: scale(0) rotate(45deg) translate(0, 0);          /* shrink away */
      }
    }
  </style>
</head>
<body>
  <span class="arrow">⬇️</span>
</body>
</html>
